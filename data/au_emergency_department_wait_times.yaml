id: au_emergency_department_wait_times
jurisdiction: Australia
title: Emergency Department Wait Times
category: Health
frequency: Annual
source: https://www.aihw.gov.au/hospitals/topics/emergency-departments/time-spent-in-emergency
last_updated: 2025-06-30
description: >
  Tracks emergency department performance across Australian public hospitals —
  specifically the percentage of ED presentations completed (admitted, referred,
  or discharged) within 4 hours. A key measure of ED efficiency and accessibility,
  reported annually by AIHW. Date is the last day of the financial year (June 30).
  Higher values are better.
