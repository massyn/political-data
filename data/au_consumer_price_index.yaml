id: au_consumer_price_index
jurisdiction: Australia
title: Consumer Price Index (CPI)
category: Cost of Living
frequency: Quarter
source: https://www.abs.gov.au/statistics/economy/price-indexes-and-inflation/consumer-price-index-australia
last_updated: 2025-12-31
collector: collectors/au_cpi.py
description: >
  Tracks the Consumer Price Index (CPI) for Australia. The inflation rate is the
  year-over-year percentage change (e.g. 3.24 means prices rose 3.24% compared to
  the same quarter last year). The index is the absolute CPI level using 2011-12
  as the base period (100), allowing long-term price comparisons.
