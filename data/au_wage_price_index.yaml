id: au_wage_price_index
jurisdiction: Australia
title: Wage Price Index
category: Employment
frequency: Quarter
source: https://www.abs.gov.au/statistics/economy/price-indexes-and-inflation/wage-price-index-australia
last_updated: 2025-12-31
collector: collectors/au_wpi.py
description: >
  Tracks the Wage Price Index (WPI) for Australia, measuring changes in the price
  of labour. When compared with CPI it shows whether wages are keeping pace with
  the cost of living — a critical measure of living standards. The annual growth
  series is the year-over-year percentage change. The index series is the absolute
  WPI level using 2008-09 as the base period (100).
