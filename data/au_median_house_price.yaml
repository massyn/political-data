id: au_median_house_price
jurisdiction: Australia
title: Median House Price
category: Housing
frequency: Quarter
source: https://www.abs.gov.au/statistics/economy/price-indexes-and-inflation/residential-property-price-indexes-eight-capital-cities
last_updated: 2025-12-31
collector: collectors/au_house_price.py
description: >
  Tracks the mean dwelling price across Australia's eight capital cities as a proxy
  for housing affordability and market conditions. Housing affordability is a critical
  political issue affecting homeownership rates and cost of living. Value is the mean
  price in Australian dollars for established house transfers across the eight capital
  cities. Note: the ABS publication reports mean price; the indicator title uses
  'median' for public familiarity but the underlying data is the mean.
